        body {
            background-color: #FDFBF7;
            color: #1A1815;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* Base Glassmorphism Styles with Smooth Transitions */
        .glass-card {
            background: rgba(253, 251, 247, 0.90);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* Around Line 58 */
        .glass-card-dark {
            background: rgba(0, 0, 0, 0.30); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(197, 160, 89, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* Luxury Gold Glow & Elevate Hover Effect for Property Cards */
        .glass-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(197, 160, 89, 0.8);
            box-shadow: 0 20px 40px -15px rgba(197, 160, 89, 0.25),
                        0 0 20px 2px rgba(197, 160, 89, 0.15);
        }

        /* Golden Light Beam Shimmer Effect across Cards */
        .glass-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
            60deg,
            transparent 30%,
            rgba(255, 255, 255, 0.3) 50%,
            transparent 70%
            );
            transform: rotate(30deg);
            transition: transform 0.8s ease;
            pointer-events: none;
            opacity: 0;
        }

        .glass-card:hover::after {
            transform: rotate(30deg) translate(20%, 20%);
            opacity: 1;
        }

        /* Interactive Button pulse animation within boxes */
        button, a {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Entrance Fade-In Up Keyframes for Box Elements */
        @keyframes luxuryBoxFade {
            0% {
            opacity: 0;
            transform: translateY(25px);
            }
            100% {
            opacity: 1;
            transform: translateY(0);
            }
        }

        .animate-box-entry {
            animation: luxuryBoxFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>

    function PropertyCard({ prop, onOpenSidebar, index }) {
      const [slideIndex, setSlideIndex] = useState(0);

      const nextSlide = (e) => {
        e.stopPropagation();
        setSlideIndex((prev) => (prev + 1) % prop.slides.length);

      const prevSlide = (e) => {
        e.stopPropagation();
        setSlideIndex((prev) => (prev - 1 + prop.slides.length) % prop.slides.length);
      };

      return (
        <motion.div 
          initial={{ opacity: 0, y: 40 }}
          whileInView={{ opacity: 1, y: 0 }}
          viewport={{ once: true }}
          transition={{ duration: 0.6, delay: index * 0.15 }}
          whileHover={{ y: -8 }}
          className="group glass-card rounded-3xl overflow-hidden transition-all duration-500 hover:shadow-2xl flex flex-col justify-between border border-[#C5A059]/30"

                key={slideIndex}
                src={prop.slides[slideIndex].url}
                alt={prop.slides[slideIndex].title}
                initial={{ opacity: 0, scale: 1.05 }}

    function App() {
      const [showSplash, setShowSplash] = useState(true);
      const [activeSidebarProperty, setActiveSidebarProperty] = useState(null);

      const [selectedProperty, setSelectedProperty] = useState(PROPERTIES[0].id);
      const [stayDuration, setStayDuration] = useState('24h');
      
      const [bookingDate, setBookingDate] = useState('');
      const [bookingTime, setBookingTime] = useState('12:00');
      const [exitDate, setExitDate] = useState('');
      const [exitTime, setExitTime] = useState('12:00');

      const [guestDetails, setGuestDetails] = useState({ name: '', phone: '', email: '' });
      
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [isHostLoginOpen, setIsHostLoginOpen] = useState(false);
      const [hostPinInput, setHostPinInput] = useState('');
      const [isHostAuthenticated, setIsHostAuthenticated] = useState(false);
      const [pinError, setPinError] = useState(false);
      const [bookings, setBookings] = useState([]);

      const price = stayDuration === '1h' ? 2500 : 5000;

      useEffect(() => {
        if (!bookingDate || !bookingTime) return;
        const checkIn = new Date(`${bookingDate}T${bookingTime}`);
        if (isNaN(checkIn.getTime())) return;

        let exit = new Date(checkIn);
        if (stayDuration === '1h') {
          exit.setHours(exit.getHours() + 1);
        } else {
          exit.setDate(exit.getDate() + 1);
        }

        setExitDate(exit.toISOString().split('T')[0]);
        setExitTime(exit.toTimeString().substring(0, 5));
      }, [bookingDate, bookingTime, stayDuration]);

      useEffect(() => {
        lucide.createIcons();
        const saved = localStorage.getItem('srinivas_bookings');
        if (saved) {
          try { setBookings(JSON.parse(saved)); } catch (e) { console.error(e); }
        }
      }, []);

      useEffect(() => {
        lucide.createIcons();
      }, [isCheckoutOpen, isHostLoginOpen, isHostAuthenticated, showSplash, activeSidebarProperty]);

      const saveBooking = (newBooking) => {
        const updated = [newBooking, ...bookings];
        setBookings(updated);
        localStorage.setItem('srinivas_bookings', JSON.stringify(updated));
      };

      const handleBookingSubmit = (e) => {
        e.preventDefault();
        setIsCheckoutOpen(true);
      };

      const finalizeBooking = () => {
        const propertyObj = PROPERTIES.find(p => p.id === selectedProperty);
        const newBooking = {
          id: 'SSH-' + Math.floor(100000 + Math.random() * 900000),
          property: propertyObj.name,
          city: propertyObj.city,
          duration: stayDuration === '1h' ? '1 Hour Short Stay' : '24 Hours / 1 Night',
          checkInDate: bookingDate,
          checkInTime: bookingTime,
          checkOutDate: exitDate,
          checkOutTime: exitTime,
          guestName: guestDetails.name,
          guestPhone: guestDetails.phone,
          amount: price,
          status: 'Active'
        };

        saveBooking(newBooking);

        const message = encodeURIComponent(
          `*NEW LUXURY RESERVATION*\n` +
          `---------------------------\n` +
          `*Booking ID:* ${newBooking.id}\n` +
          `*Property:* ${newBooking.property}\n` +
          `*Guest Name:* ${newBooking.guestName}\n` +
          `*Phone:* ${newBooking.guestPhone}\n` +
          `*Check-In:* ${newBooking.checkInDate} at ${newBooking.checkInTime}\n` +
          `*Expected Exit:* ${newBooking.checkOutDate} at ${newBooking.checkOutTime}\n` +
          `*Duration:* ${newBooking.duration}\n` +
          `*Total Amount:* ₹${newBooking.amount.toLocaleString('en-IN')}\n\n` +
          `Payment verified via Paytm UPI.`
        );

        window.open(`https://wa.me/${HOST_PHONE.replace('+', '')}?text=${message}`, '_blank');
        setIsCheckoutOpen(false);
      };

      const markGuestCheckedOut = (id) => {
        const updated = bookings.map(b => b.id === id ? { ...b, status: 'Completed' } : b);
        setBookings(updated);
        localStorage.setItem('srinivas_bookings', JSON.stringify(updated));
      };

      const handleHostAuth = (e) => {
        e.preventDefault();
        if (hostPinInput === SECRET_PIN) {
          setIsHostAuthenticated(true);
          setIsHostLoginOpen(false);
          setPinError(false);
          setHostPinInput('');
        } else {
          setPinError(true);
        }
      };

      return (
        <div className="min-h-screen">
          
          {/* --- 1. LOTTIE ANIMATION ENTRANCE SCREEN --- */}
          <AnimatePresence>
            {showSplash && (
              <motion.div 
                initial={{ opacity: 1 }}
                exit={{ opacity: 0, scale: 1.05 }}
                transition={{ duration: 0.8 }}
                className="fixed inset-0 z-50 bg-[#FDFBF7] flex flex-col items-center justify-center p-6 text-center"
              >
                {/* Official Direct Lottie Web Component Player with reliable JSON vector animation */}
                <div className="w-64 h-64 md:w-80 md:h-80 mb-4 flex items-center justify-center">
                 <img 
                        src="House.svg" 
                        alt="House Animation" 
                        className="w-full h-full object-contain"
                    />
                </div>

                <motion.h1 
                  initial={{ opacity: 0, y: 20 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ delay: 0.2 }}
                  className="text-3xl md:text-5xl font-serif font-extrabold tracking-widest text-[#1A1815] uppercase mb-2"
                >
                  Srinivas Service Home
                </motion.h1>

                <motion.p 
                  initial={{ opacity: 0, y: 20 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ delay: 0.4 }}
                  className="text-xs uppercase tracking-[0.35em] text-[#C5A059] font-bold mb-8"
                >
                  Luxurious Stay • Rajahmundry • Bhimavaram • Kovvur
                </motion.p>

                <motion.button 
                  initial={{ opacity: 0, scale: 0.9 }}

                  whileHover={{ scale: 1.05 }}
                  whileTap={{ scale: 0.95 }}
                  transition={{ delay: 0.6 }}
                  onClick={() => setShowSplash(false)}
                  className="px-10 py-4 rounded-full bg-gradient-to-r from-[#C5A059] via-[#D4AF37] to-[#C5A059] text-white font-extrabold tracking-widest text-xs uppercase shadow-xl hover:scale-105 transition duration-300"
                >
                  Enter Experience
                </motion.button>
              </motion.div>
            )}
          </AnimatePresence>

          {/* MAIN NAVBAR */}
          <nav className="sticky top-0 z-40 glass-card border-b border-[#C5A059]/30 px-6 py-4 shadow-sm">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div className="flex items-center space-x-2">
                <span className="text-2xl font-serif font-extrabold tracking-wider text-[#1A1815]">
                  SRINIVAS
                </span>
                <span className="text-xs tracking-widest text-[#C5A059] font-bold uppercase border-l border-[#C5A059]/40 pl-2">
                  Service Home
                </span>
              </div>

              <div className="hidden md:flex items-center space-x-8 text-xs uppercase tracking-wider font-semibold text-[#1A1815]">
                <a href="#properties" className="hover:text-[#C5A059] transition">Residences</a>
                <a href="#booking" className="hover:text-[#C5A059] transition">Reserve</a>
                <a href="#contact" className="hover:text-[#C5A059] transition">Contact</a>
              </div>

              <button 
                onClick={() => setIsHostLoginOpen(true)}
                className="flex items-center space-x-2 text-xs uppercase tracking-wider px-4 py-2 rounded-full border border-[#C5A059]/50 text-[#C5A059] font-bold hover:bg-[#C5A059] hover:text-white transition duration-300"
              >
                <i data-lucide="lock" className="w-3.5 h-3.5"></i>
                <span>{isHostAuthenticated ? 'Host Portal' : 'Host Login'}</span>
              </button>
            </div>
          </nav>

          {/* HERO SECTION WITH VIDEO ANIMATION BACKGROUND */}
          <section className="relative min-h-[85vh] flex items-center justify-center px-6 overflow-hidden">
            <div className="absolute inset-0 z-0">
              <video 
                autoPlay 
                loop 
                muted 
                playsInline
                className="w-full h-full object-cover filter brightness-75 scale-105"
              >
                <source src="house-bg.mp4" type="video/mp4" />
              </video>
              <div className="absolute inset-0 bg-gradient-to-t from-[#FDFBF7] via-[#FDFBF7]/40 to-black/30" />
            </div>

            <motion.div 
              initial={{ opacity: 0, y: 30 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.8 }}
              className="relative z-10 max-w-4xl text-center space-y-6 glass-card-dark p-8 md:p-12 rounded-3xl border border-[#C5A059]/40 text-white shadow-2xl my-16 mb-10"
            >
              <span className="inline-block text-xs uppercase tracking-[0.3em] text-[#C5A059] font-bold px-4 py-1.5 border border-[#C5A059]/40 rounded-full bg-black/40 backdrop-blur-md">
                Unrivaled Private Luxury Stays
              </span>
              <h1 className="text-4xl md:text-7xl font-serif font-extrabold tracking-tight text-amber-100">
                Srinivas Service Home
              </h1>
              <p className="text-base md:text-xl text-neutral-300 max-w-2xl mx-auto font-light leading-relaxed">
                Experience ultra-luxurious private stays across Rajahmundry, Bhimavaram, and Kovvur with 24/7 concierge & automated reservations.
              </p>

              <div className="flex flex-col sm:flex-row justify-center gap-4 pt-4">
                <a href="#booking" className="px-8 py-4 rounded-full bg-[#C5A059] text-white font-bold tracking-wider text-xs uppercase hover:bg-amber-600 transition shadow-lg shadow-[#C5A059]/30">
                  Book Experience
                </a>
                <a href="#properties" className="px-8 py-4 rounded-full border border-[#C5A059] text-white font-bold tracking-wider text-xs uppercase hover:bg-white/10 transition">
                  Explore Residences
                </a>
              </div>
            </motion.div>
          </section>

          {/* PROPERTY SHOWCASE */}
          <section id="properties" className="py-24 px-6 max-w-7xl mx-auto">
            <motion.div 
              initial={{ opacity: 0, y: 20 }}
              whileInView={{ opacity: 1, y: 0 }}
              viewport={{ once: true }}
              className="text-center space-y-3 mb-16"
            >
              <h2 className="text-xs uppercase tracking-[0.3em] text-[#C5A059] font-bold">Interactive Room Tour</h2>
              <p className="text-3xl md:text-5xl font-serif font-bold text-[#1A1815]">Our 3 Luxury Residences</p>
              <p className="text-xs text-neutral-500">Use slide arrows (&lt; &gt;) to tour 10 views of Living Rooms, Kitchens, Master Bedrooms & Balconies</p>
            </motion.div>

            <div className="grid md:grid-cols-3 gap-8">
              {PROPERTIES.map((prop, idx) => (
                <PropertyCard key={prop.id} prop={prop} index={idx} onOpenSidebar={(p) => setActiveSidebarProperty(p)} />
              ))}
            </div>
          </section>

          {/* SIDEBAR DRAWER */}
          <AnimatePresence>
            {activeSidebarProperty && (
              <motion.div 
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex justify-end"
              >
                <motion.div 
                  initial={{ x: '100%' }}
                  animate={{ x: 0 }}
                  exit={{ x: '100%' }}
                  transition={{ type: 'spring', damping: 25, stiffness: 200 }}
                  className="bg-white max-w-md w-full h-full shadow-2xl p-6 md:p-8 overflow-y-auto space-y-6 relative border-l border-[#C5A059]/40"
                >
                  <button 
                    onClick={() => setActiveSidebarProperty(null)}
                    className="absolute top-6 right-6 p-2 rounded-full bg-neutral-100 text-neutral-600 hover:bg-neutral-200"
                  >✕</button>

                  <div className="space-y-2 pt-4">
                    <span className="text-xs font-bold uppercase tracking-widest text-[#C5A059]">Property Breakdown</span>
                    <h3 className="text-3xl font-serif font-bold text-[#1A1815]">{activeSidebarProperty.name}</h3>
                    <p className="text-xs text-neutral-500">{activeSidebarProperty.tagline}</p>
                  </div>

                  <div className="space-y-3">
                    <p className="text-xs font-bold uppercase text-[#1A1815] border-b border-neutral-200 pb-2">Specifications</p>
                    <div className="grid grid-cols-2 gap-3 text-xs">
                      <div className="bg-[#FAF6F0] p-3 rounded-xl border border-neutral-200">
                        <span className="text-neutral-400 block text-[10px]">Area</span>
                        <span className="font-bold text-[#1A1815]">{activeSidebarProperty.specifications.sqft}</span>
                      </div>
                      <div className="bg-[#FAF6F0] p-3 rounded-xl border border-neutral-200">
                        <span className="text-neutral-400 block text-[10px]">Bedrooms</span>
                        <span className="font-bold text-[#1A1815]">{activeSidebarProperty.specifications.bedrooms}</span>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-3">
                    <p className="text-xs font-bold uppercase text-[#1A1815] border-b border-neutral-200 pb-2">Room Gallery</p>
                    <div className="space-y-3">
                      {activeSidebarProperty.slides.map((s, idx) => (
                        <div key={idx} className="rounded-xl overflow-hidden border border-neutral-200 space-y-1">
                          <img src={s.url} alt={s.title} className="w-full h-36 object-cover" />
                          <p className="p-2 text-xs font-semibold text-center bg-[#FAF6F0] text-[#1A1815]">{s.title}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="pt-4 border-t border-neutral-200">
                    <a 
                      href="#booking"
                      onClick={() => {
                        setSelectedProperty(activeSidebarProperty.id);
                        setActiveSidebarProperty(null);
                      }}
                      className="block w-full text-center py-3.5 rounded-full bg-[#C5A059] text-white font-bold text-xs uppercase hover:bg-amber-600 transition"
                    >
                      Book This Residence
                    </a>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* RESERVATION ENGINE */}
          <section id="booking" className="py-24 px-6 bg-[#FAF6F0]/90 border-y border-[#C5A059]/20">
            <div className="max-w-4xl mx-auto space-y-12">
              <motion.div 
                initial={{ opacity: 0, y: 20 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: true }}
                className="text-center space-y-3"
              >
                <h2 className="text-xs uppercase tracking-[0.3em] text-[#C5A059] font-bold">Reservation Engine</h2>
                <p className="text-3xl md:text-5xl font-serif font-bold text-[#1A1815]">Select Date & Duration</p>
              </motion.div>

              <motion.form 
                initial={{ opacity: 0, y: 30 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: true }}
                transition={{ duration: 0.6 }}
                onSubmit={handleBookingSubmit} 
                className="glass-card border border-[#C5A059]/30 rounded-3xl p-6 md:p-10 space-y-8 shadow-xl"
              >
                {/* Location */}
                <div className="space-y-3">
                  <label className="text-xs uppercase tracking-wider text-[#C5A059] font-bold flex items-center space-x-2">
                    <i data-lucide="map-pin" className="w-4 h-4"></i>
                    <span>1. Location</span>
                  </label>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    {PROPERTIES.map((p) => (
                      <button
                        key={p.id}
                        type="button"
                        onClick={() => setSelectedProperty(p.id)}
                        className={`p-4 rounded-2xl border text-left transition-all duration-300 ${
                          selectedProperty === p.id 
                            ? 'border-[#C5A059] bg-[#FAF6F0] text-[#1A1815] shadow-md font-bold scale-[1.02]' 
                            : 'border-neutral-200 bg-white text-neutral-500 hover:border-[#C5A059]/50'
                        }`}
                      >
                        <p className="font-serif text-lg">{p.name}</p>
                        <p className="text-xs text-neutral-400 mt-1">{p.city}</p>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Duration */}
                <div className="space-y-3">
                  <label className="text-xs uppercase tracking-wider text-[#C5A059] font-bold flex items-center space-x-2">
                    <i data-lucide="clock" className="w-4 h-4"></i>
                    <span>2. Duration</span>
                  </label>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button
                      type="button"
                      onClick={() => setStayDuration('1h')}
                      className={`p-5 rounded-2xl border text-left flex justify-between items-center transition-all duration-300 ${
                        stayDuration === '1h' ? 'border-[#C5A059] bg-[#FAF6F0] font-bold scale-[1.01]' : 'border-neutral-200 bg-white text-neutral-500 hover:border-[#C5A059]/50'
                      }`}
                    >
                      <div>
                        <p className="font-serif text-base text-[#1A1815]">Short Stay (1 Hour)</p>
                        <p className="text-xs text-neutral-400">Quick relaxation</p>
                      </div>
                      <span className="text-xl font-bold text-[#C5A059]">₹2,500</span>
                    </button>

                    <button
                      type="button"
                      onClick={() => setStayDuration('24h')}
                      className={`p-5 rounded-2xl border text-left flex justify-between items-center transition-all duration-300 ${
                        stayDuration === '24h' ? 'border-[#C5A059] bg-[#FAF6F0] font-bold scale-[1.01]' : 'border-neutral-200 bg-white text-neutral-500 hover:border-[#C5A059]/50'
                      }`}
                    >
                      <div>
                        <p className="font-serif text-base text-[#1A1815]">Full Stay (24 Hours / 1 Night)</p>
                        <p className="text-xs text-neutral-400">Complete private luxury stay</p>
                      </div>
                      <span className="text-xl font-bold text-[#C5A059]">₹5,000</span>
                    </button>
                  </div>
                </div>

                {/* Check-In & Auto Exit Schedule */}
                <div className="space-y-4">
                  <label className="text-xs uppercase tracking-wider text-[#C5A059] font-bold flex items-center space-x-2">
                    <i data-lucide="calendar" className="w-4 h-4"></i>
                    <span>3. Check-In & Exit Schedule</span>
                  </label>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white/80 p-5 rounded-2xl border border-neutral-200">
                    <div className="space-y-3">
                      <p className="text-xs font-bold uppercase text-[#C5A059]">Check-In</p>
                      <div>
                        <label className="text-[10px] uppercase text-neutral-500">Check-In Date</label>
                        <input 
                          type="date" 
                          required 
                          value={bookingDate}
                          onChange={(e) => setBookingDate(e.target.value)}
                          className="w-full bg-white border border-neutral-300 rounded-xl px-4 py-2.5 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                        />
                      </div>
                      <div>
                        <label className="text-[10px] uppercase text-neutral-500">Check-In Time</label>
                        <input 
                          type="time" 
                          required 
                          value={bookingTime}
                          onChange={(e) => setBookingTime(e.target.value)}
                          className="w-full bg-white border border-neutral-300 rounded-xl px-4 py-2.5 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                        />
                      </div>
                    </div>

                    <div className="space-y-3">
                      <p className="text-xs font-bold uppercase text-[#1A1815]">Expected Departure / Exit</p>
                      <div>
                        <label className="text-[10px] uppercase text-neutral-500">Exit Date</label>
                        <input 
                          type="date" 
                          required 
                          value={exitDate}
                          onChange={(e) => setExitDate(e.target.value)}
                          className="w-full bg-white border border-neutral-300 rounded-xl px-4 py-2.5 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                        />
                      </div>
                      <div>
                        <label className="text-[10px] uppercase text-neutral-500">Exit Time</label>
                        <input 
                          type="time" 
                          required 
                          value={exitTime}
                          onChange={(e) => setExitTime(e.target.value)}
                          className="w-full bg-white border border-neutral-300 rounded-xl px-4 py-2.5 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                        />
                      </div>
                    </div>
                  </div>
                </div>

                {/* Guest Details */}
                <div className="space-y-4">
                  <label className="text-xs uppercase tracking-wider text-[#C5A059] font-bold">4. Guest Information</label>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input 
                      type="text" 
                      placeholder="Full Name" 
                      required 
                      value={guestDetails.name}
                      onChange={(e) => setGuestDetails({...guestDetails, name: e.target.value})}
                      className="bg-white border border-neutral-300 rounded-xl px-4 py-3 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                    />
                    <input 
                      type="tel" 
                      placeholder="Phone Number" 
                      required 
                      value={guestDetails.phone}
                      onChange={(e) => setGuestDetails({...guestDetails, phone: e.target.value})}
                      className="bg-white border border-neutral-300 rounded-xl px-4 py-3 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                    />
                    <input 
                      type="email" 
                      placeholder="Email Address" 
                      required 
                      value={guestDetails.email}
                      onChange={(e) => setGuestDetails({...guestDetails, email: e.target.value})}
                      className="bg-white border border-neutral-300 rounded-xl px-4 py-3 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                    />
                  </div>
                </div>

                <div className="pt-6 border-t border-neutral-200 flex flex-col md:flex-row justify-between items-center gap-6">
                  <div>
                    <span className="text-xs uppercase text-neutral-400 block">Total Amount</span>
                    <span className="text-3xl font-extrabold text-[#C5A059]">₹{price.toLocaleString('en-IN')}</span>
                  </div>
                  <button type="submit" className="w-full md:w-auto px-10 py-4 rounded-full bg-[#C5A059] text-white font-bold tracking-wider text-xs uppercase hover:bg-amber-600 transition shadow-lg hover:shadow-amber-500/20">
                    Proceed to Payment
                  </button>
                </div>

              </motion.form>
            </div>
          </section>

          {/* CHECKOUT MODAL */}
          <AnimatePresence>
            {isCheckoutOpen && (
              <motion.div 
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md flex items-center justify-center p-4"
              >
                <motion.div 
                  initial={{ scale: 0.9, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  exit={{ scale: 0.9, opacity: 0 }}
                  className="bg-white border border-[#C5A059]/40 max-w-lg w-full rounded-3xl p-6 space-y-6 relative shadow-2xl"
                >
                  <button onClick={() => setIsCheckoutOpen(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-black">✕</button>

                  <div className="text-center space-y-2">
                    <h3 className="text-2xl font-serif font-bold text-[#1A1815]">Pay via Paytm UPI</h3>
                    <p className="text-xs text-neutral-500">Scan QR Code or Click Paytm link to authorize booking.</p>
                  </div>

                  <div className="bg-[#FAF6F0] p-4 rounded-2xl border border-neutral-200 space-y-2 text-sm">
                    <div className="flex justify-between">
                      <span className="text-neutral-500">Residence:</span>
                      <span className="text-[#1A1815] font-bold">{PROPERTIES.find(p => p.id === selectedProperty)?.name}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-neutral-500">Check-In:</span>
                      <span className="text-[#1A1815]">{bookingDate} at {bookingTime}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-neutral-500">Expected Departure:</span>
                      <span className="text-[#C5A059] font-bold">{exitDate} at {exitTime}</span>
                    </div>
                    <div className="flex justify-between border-t border-neutral-200 pt-2 font-bold text-base">
                      <span>Total Amount:</span>
                      <span className="text-[#C5A059]">₹{price.toLocaleString('en-IN')}</span>
                    </div>
                  </div>

                  <div className="text-center space-y-4">
                    <div className="bg-white p-3 inline-block rounded-2xl border border-neutral-200 shadow-md">
                      <img 
                        src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=7780376043@paytm&pn=SrinivasServiceHome&am=${price}`}
                        alt="Paytm QR" 
                        className="w-32 h-32 mx-auto"
                      />
                    </div>
                    <p className="text-xs text-neutral-500">Paytm Contact: <span className="text-[#C5A059] font-bold">{DISPLAY_PHONE}</span></p>

                    <div className="space-y-3">
                      <a href={`upi://pay?pa=7780376043@paytm&pn=SrinivasServiceHome&am=${price}`} className="block w-full py-3.5 rounded-full bg-[#C5A059] text-white font-bold hover:bg-amber-600 shadow-md">
                        Pay via Paytm App
                      </a>
                      <button onClick={finalizeBooking} className="w-full py-3.5 rounded-full border border-[#C5A059] text-[#1A1815] font-bold hover:bg-[#FAF6F0]">
                        Confirm & Send Details to WhatsApp
                      </button>
                    </div>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* HOST LOGIN MODAL */}
          <AnimatePresence>
            {isHostLoginOpen && (
              <motion.div 
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md flex items-center justify-center p-4"
              >
                <motion.div 
                  initial={{ scale: 0.9, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  exit={{ scale: 0.9, opacity: 0 }}
                  className="bg-white border border-[#C5A059]/40 max-w-md w-full rounded-3xl p-6 space-y-6 relative shadow-2xl"
                >
                  <button onClick={() => setIsHostLoginOpen(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-black">✕</button>
                  
                  <div className="text-center space-y-2">
                    <h3 className="text-2xl font-serif font-bold text-[#1A1815]">Host Access Portal</h3>
                    <p className="text-xs text-neutral-500">Enter Security PIN to open management panel</p>
                  </div>

                  <form onSubmit={handleHostAuth} className="space-y-4">
                    <input 
                      type="password"
                      maxLength={4}
                      placeholder="PIN (Enter Pin)"
                      value={hostPinInput}
                      onChange={(e) => setHostPinInput(e.target.value)}
                      className="w-full bg-[#FAF6F0] border border-neutral-300 rounded-xl px-4 py-3 text-center text-2xl tracking-widest text-neutral-800 focus:outline-none focus:border-[#C5A059]"
                    />
                    {pinError && <p className="text-xs text-red-500 text-center">Invalid Security PIN</p>}
                    <button type="submit" className="w-full py-3.5 rounded-full bg-[#C5A059] text-white font-bold">
                      Login
                    </button>
                  </form>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* HOST DASHBOARD */}
          {isHostAuthenticated && (
            <motion.section 
              initial={{ opacity: 0, y: 20 }}
              animate={{ opacity: 1, y: 0 }}
              className="py-12 px-6 bg-white border-b border-[#C5A059]/40"
            >
              <div className="max-w-6xl mx-auto space-y-6">
                <div className="flex justify-between items-center border-b border-neutral-200 pb-4">
                  <div>
                    <h2 className="text-2xl font-serif font-bold text-[#1A1815]">Host Departure & Exit Tracker</h2>
                    <p className="text-xs text-neutral-500">Track active guest reservations and departure times</p>
                  </div>
                  <button onClick={() => setIsHostAuthenticated(false)} className="text-xs border border-red-500 text-red-500 px-4 py-2 rounded-full hover:bg-red-50">
                    Logout
                  </button>
                </div>

                {bookings.length === 0 ? (
                  <p className="text-center py-6 text-neutral-400 text-sm">No reservations stored yet.</p>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-xs text-neutral-700">
                      <thead className="uppercase bg-[#FAF6F0] text-[#C5A059]">
                        <tr>
                          <th className="p-3">ID</th>
                          <th className="p-3">Guest Details</th>
                          <th className="p-3">Residence</th>
                          <th className="p-3">Check-In</th>
                          <th className="p-3">Expected Exit</th>
                          <th className="p-3">Status</th>
                          <th className="p-3">Action</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-neutral-200 bg-white">
                        {bookings.map((b) => (
                          <tr key={b.id}>
                            <td className="p-3 text-[#C5A059] font-mono font-bold">{b.id}</td>
                            <td className="p-3">
                              <p className="font-bold text-[#1A1815]">{b.guestName}</p>
                              <p className="text-neutral-500">{b.guestPhone}</p>
                            </td>
                            <td className="p-3">{b.property}</td>
                            <td className="p-3">{b.checkInDate || b.date} ({b.checkInTime || b.time})</td>
                            <td className="p-3 text-[#C5A059] font-bold">{b.checkOutDate ? `${b.checkOutDate} (${b.checkOutTime})` : 'N/A'}</td>
                            <td className="p-3">
                              <span className={`px-2.5 py-1 rounded-full text-[10px] font-bold uppercase ${
                                b.status === 'Completed' 
                                  ? 'bg-neutral-100 text-neutral-500' 
                                  : 'bg-green-100 text-green-700 border border-green-300'
                              }`}>
                                {b.status || 'Active'}
                              </span>
                            </td>
                            <td className="p-3">
                              {b.status !== 'Completed' && (
                                <button 
                                  onClick={() => markGuestCheckedOut(b.id)}
                                  className="text-[10px] border border-[#C5A059] text-[#C5A059] px-3 py-1 rounded-lg hover:bg-[#C5A059] hover:text-white transition"
                                >
                                  Mark Checked Out
                                </button>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </motion.section>
          )}

          {/* FOOTER */}
          <footer id="contact" className="py-12 px-6 bg-[#1A1815] text-white text-center space-y-4">
            <p className="text-[#C5A059] font-serif text-xl font-bold">Srinivas Service Home</p>
            <p className="text-xs text-neutral-400">Direct Host Contact & Paytm: {DISPLAY_PHONE}</p>
            <p className="text-xs text-neutral-500">© {new Date().getFullYear()} Srinivas Service Home. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
