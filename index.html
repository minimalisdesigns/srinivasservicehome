    function isSlotBooked(roomId, dateStr, hourInt, bookings, hostLocks) {
      if (!dateStr || hourInt === undefined) return false;
      
      const isLocked = hostLocks.some(l => {
        if (l.roomId !== roomId) return false;
        if (l.startDate <= dateStr && dateStr <= l.endDate) {
          if (l.startDate === l.endDate && l.startDate === dateStr) {
            return hourInt >= l.startHour && hourInt <= l.endHour;
          }
          if (dateStr === l.startDate) return hourInt >= l.startHour;
          if (dateStr === l.endDate) return hourInt <= l.endHour;
          return true;
        }
        return false;
      });
      if (isLocked) return true;

      return bookings.some(b => {
        if (b.roomId !== roomId || b.status === 'Completed') return false;
        const startD = b.startDate;
        const endD = b.endDate;
        const startH = parseInt(b.startHour || 0, 10);
        const endH = parseInt(b.endHour || 24, 10);

        if (dateStr >= startD && dateStr <= endD) {
          if (startD === endD && startD === dateStr) {
            return hourInt >= startH && hourInt <= endH;
          }
          if (dateStr === startD) return hourInt >= startH;
          if (dateStr === endD) return hourInt <= endH;
          return true;
        }
        return false;
      });
    }

    function RangeAvailabilityCalendar({ roomId, bookings, hostLocks, startDate, endDate }) {
      const [viewDate, setViewDate] = useState(startDate || new Date().toISOString().split('T')[0]);
      const hoursList = Array.from({ length: 24 }, (_, i) => i);

      return (
        <div className="bg-[#FAF6F0] p-4 rounded-2xl border border-[#C5A059]/30 shadow-inner space-y-4">
          <div className="flex flex-col sm:flex-row justify-between items-center gap-2">
            <span className="font-serif font-bold text-xs uppercase text-[#1A1815]">Inspect Date & Time Slot Availability:</span>
            <input 
              type="date"
              value={viewDate}
              onChange={(e) => setViewDate(e.target.value)}
              className="bg-white border border-neutral-300 rounded-lg px-2 py-1 text-xs text-neutral-800"
            />
          </div>

          <div className="grid grid-cols-6 sm:grid-cols-8 gap-1.5 max-h-48 overflow-y-auto p-1">
            {hoursList.map((hour) => {
              const booked = isSlotBooked(roomId, viewDate, hour, bookings, hostLocks);
              const formattedHour = String(hour).padStart(2, '0') + ":00";

              let btnStyle = "bg-green-50 text-green-700 border-green-200";
              if (booked) {
                btnStyle = "bg-red-100 text-red-700 border-red-300 font-bold";
              }

              return (
                <div
                  key={hour}
                  className={`p-1.5 rounded-lg border text-center text-[10px] transition flex flex-col items-center justify-center ${btnStyle}`}
                >
                  <span className="font-bold">{formattedHour}</span>
                  <span className="text-[8px] opacity-90">{booked ? 'LOCKED' : 'Free'}</span>
                </div>
              );
            })}
          </div>
          <p className="text-[10px] text-neutral-500 text-center">Red = Locked/Booked at specific time zones. Green = Available.</p>
        </div>
      );
    }

    function PropertyCard({ prop, onOpenSidebar, index }) {
      const [slideIndex, setSlideIndex] = useState(0);

      const nextSlide = (e) => {
        e.stopPropagation();
        setSlideIndex((prev) => (prev + 1) % prop.rooms[0].slides.length);
      };

      const prevSlide = (e) => {
        e.stopPropagation();
        setSlideIndex((prev) => (prev - 1 + prop.rooms[0].slides.length) % prop.rooms[0].slides.length);
      };

      return (
        <motion.div 
          initial={{ opacity: 0, y: 40 }}
          whileInView={{ opacity: 1, y: 0 }}
          viewport={{ once: true }}
          transition={{ duration: 0.6, delay: index * 0.15 }}
          whileHover={{ y: -8 }}
          className="group glass-card rounded-3xl overflow-hidden transition-all duration-500 hover:shadow-2xl flex flex-col justify-between border border-[#C5A059]/30"
        >
          <div className="relative h-64 md:h-72 overflow-hidden select-none">
            <AnimatePresence mode="wait">
              <motion.img 
                key={slideIndex}

    function App() {
      const [showSplash, setShowSplash] = useState(true);
      const [activeSidebarProperty, setActiveSidebarProperty] = useState(null);

      const [selectedPropertyId, setSelectedPropertyId] = useState(PROPERTIES[0].id);
      const [selectedRoomId, setSelectedRoomId] = useState(PROPERTIES[0].rooms[0].roomId);
      const [stayDuration, setStayDuration] = useState('24h');
      
      const todayStr = new Date().toISOString().split('T')[0];
      const [startDate, setStartDate] = useState(todayStr);
      const [startTime, setStartTime] = useState('13:00');
      const [endDate, setEndDate] = useState(todayStr);
      const [endTime, setEndTime] = useState('13:00');

      const [guestDetails, setGuestDetails] = useState({ name: '', phone: '', email: '' });
      
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [isHostLoginOpen, setIsHostLoginOpen] = useState(false);
      const [hostPinInput, setHostPinInput] = useState('');
      const [isHostAuthenticated, setIsHostAuthenticated] = useState(false);
      const [pinError, setPinError] = useState(false);
      const [bookings, setBookings] = useState([]);
      const [hostLocks, setHostLocks] = useState([]); 

      // Host Manual Booking state
      const [hostSelectedHouse, setHostSelectedHouse] = useState(PROPERTIES[0].id);
      const [hostSelectedRoomId, setHostSelectedRoomId] = useState(PROPERTIES[0].rooms[0].roomId);
      const [hostStartDate, setHostStartDate] = useState(todayStr);
      const [hostStartTime, setHostStartTime] = useState('13:00');
      const [hostEndDate, setHostEndDate] = useState(todayStr);
      const [hostEndTime, setHostEndTime] = useState('13:00');
      const [hostOfflineGuestName, setHostOfflineGuestName] = useState('');
      const [hostPaymentStatus, setHostPaymentStatus] = useState('Paid');

      const price = stayDuration === '1h' ? 2500 : 5000;

      useEffect(() => {
        const prop = PROPERTIES.find(p => p.id === selectedPropertyId);
        if (prop && prop.rooms.length > 0) {
          setSelectedRoomId(prop.rooms[0].roomId);
        }
      }, [selectedPropertyId]);

      useEffect(() => {
        const prop = PROPERTIES.find(p => p.id === hostSelectedHouse);
        if (prop && prop.rooms.length > 0) {
          setHostSelectedRoomId(prop.rooms[0].roomId);
        }
      }, [hostSelectedHouse]);

      // 3-Month Data Purge Logic & LocalStorage Initialization
      useEffect(() => {
        lucide.createIcons();
        const now = new Date();
        const threeMonthsAgo = new Date(now.setMonth(now.getMonth() - 3));

        const savedBookings = localStorage.getItem('srinivas_bookings');
        if (savedBookings) {
          try {
            const parsed = JSON.parse(savedBookings);
            const filtered = parsed.filter(b => {
              if (b.status === 'Completed' && b.startDate) {
                const startDateObj = new Date(b.startDate);
                return startDateObj >= threeMonthsAgo;
              }
              return true;
            });
            setBookings(filtered);
          } catch (e) { console.error(e); }
        }

        const savedLocks = localStorage.getItem('srinivas_locks');
        if (savedLocks) {
          try { setHostLocks(JSON.parse(savedLocks)); } catch (e) { console.error(e); }
        }
      }, []);

      useEffect(() => {
        lucide.createIcons();
      }, [isCheckoutOpen, isHostLoginOpen, isHostAuthenticated, showSplash, activeSidebarProperty, selectedPropertyId, hostSelectedHouse]);

      // Robust persistence handler for bookings and locks
      const saveBookingAndLock = (newBooking, newLock) => {
        const updatedBookings = [newBooking, ...bookings];
        setBookings(updatedBookings);
        localStorage.setItem('srinivas_bookings', JSON.stringify(updatedBookings));

        if (newLock) {
          const updatedLocks = [...hostLocks, newLock];
          setHostLocks(updatedLocks);
          localStorage.setItem('srinivas_locks', JSON.stringify(updatedLocks));
        }
      };

      const hasRangeConflict = (roomId, sDate, sTime, eDate, eTime) => {
        const startH = parseInt(sTime.split(':')[0], 10);
        const endH = parseInt(eTime.split(':')[0], 10);

        const lockConflict = hostLocks.some(l => {
          if (l.roomId !== roomId) return false;
          if (sDate <= l.endDate && eDate >= l.startDate) {
            if (sDate === l.startDate && sDate === l.endDate) {
              return !(eH <= l.startHour || startH >= l.endHour);
            }
            return true;
          }
          return false;
        });
        if (lockConflict) return true;

        return bookings.some(b => {
          if (b.roomId !== roomId || b.status === 'Completed') return false;
          const bsDate = b.startDate;
          const beDate = b.endDate;
          const bsH = parseInt(b.startHour || 0, 10);
          const beH = parseInt(b.endHour || 24, 10);

          if (sDate <= beDate && eDate >= bsDate) {
            if (sDate === beDate && sDate === bsDate) {
              return !(eH <= bsH || startH >= beH);
            }
            return true;
          }
          return false;
        });
      };

      const handleBookingSubmit = (e) => {
        e.preventDefault();
        const conflict = hasRangeConflict(selectedRoomId, startDate, startTime, endDate, endTime);
        if (conflict) {
          alert('Slot Conflict! The selected date and time range is already locked/booked. Please pick an available range.');
          return;
        }
        setIsCheckoutOpen(true);
      };

      const finalizeBooking = () => {
        const propertyObj = PROPERTIES.find(p => p.id === selectedPropertyId);
        const roomObj = propertyObj.rooms.find(r => r.roomId === selectedRoomId);
        const startH = parseInt(startTime.split(':')[0], 10);
        const endH = parseInt(endTime.split(':')[0], 10);

        const newBooking = {
          id: 'SSH-' + Math.floor(100000 + Math.random() * 900000),
          property: propertyObj.name,
          roomName: roomObj ? roomObj.name : 'Standard Room',
          roomId: selectedRoomId,
          city: propertyObj.city,
          startDate,
          startHour: startH,
          endDate,
          endHour: endH,
          guestName: guestDetails.name,
          guestPhone: guestDetails.phone,
          amount: price,
          status: 'Active',
          bookingType: 'Online (Paid)'
        };

        const newLock = {
          roomId: selectedRoomId,
          startDate,
          startHour: startH,
          endDate,
          endHour: endH
        };

        // Save into storage & state immediately
        saveBookingAndLock(newBooking, newLock);

        // Simulated Automated SMS Confirmation
        const smsText = `[AUTOMATED SMS]: Dear ${newBooking.guestName}, your reservation (${newBooking.id}) for ${newBooking.roomName} from ${newBooking.startDate} (${startTime}) to ${newBooking.endDate} (${endTime}) is confirmed! Payment of ₹${newBooking.amount} successfully received.`;
        console.log(smsText);

        // Automated WhatsApp Message Trigger
        const message = encodeURIComponent(
          `*NEW LUXURY RESERVATION*\n` +
          `---------------------------\n` +
          `*Booking ID:* ${newBooking.id}\n` +
          `*Property:* ${newBooking.property} (${newBooking.roomName})\n` +
          `*Guest Name:* ${newBooking.guestName}\n` +
          `*Phone:* ${newBooking.guestPhone}\n` +
          `*From:* ${newBooking.startDate} at ${startTime}\n` +
          `*To:* ${newBooking.endDate} at ${endTime}\n` +
          `*Total Amount:* ₹${newBooking.amount.toLocaleString('en-IN')}\n\n` +
          `Payment verified successfully via Paytm UPI.`
        );

        window.open(`https://wa.me/${HOST_PHONE.replace('+', '')}?text=${message}`, '_blank');
        setIsCheckoutOpen(false);
        alert('Payment successful! Booking confirmed and saved to host calendar.');
      };

      const markGuestCheckedOut = (id) => {
        const updated = bookings.map(b => b.id === id ? { ...b, status: 'Completed' } : b);
        setBookings(updated);
        localStorage.setItem('srinivas_bookings', JSON.stringify(updated));
      };

      const handleHostLockAndBook = (e) => {
        e.preventDefault();
        if (!hostStartDate || !hostEndDate || !hostOfflineGuestName) {
          alert('Please enter start/end dates and guest name.');
          return;
        }

        const propObj = PROPERTIES.find(p => p.id === hostSelectedHouse);
        const roomObj = propObj.rooms.find(r => r.roomId === hostSelectedRoomId);

        const startH = parseInt(hostStartTime.split(':')[0], 10);
        const endH = parseInt(hostEndTime.split(':')[0], 10);

        const offlineBooking = {
          id: 'OFF-' + Math.floor(100000 + Math.random() * 900000),
          property: propObj.name,
          roomName: roomObj ? roomObj.name : 'Room',
          roomId: hostSelectedRoomId,
          city: propObj.city,
          startDate: hostStartDate,
          startHour: startH,
          endDate: hostEndDate,
          endHour: endH,
          guestName: hostOfflineGuestName,
          guestPhone: 'Offline Entry',
          amount: 0,
          status: 'Active',
          bookingType: 'Booked Offline - Payment Done'
        };

        const newLock = { 
          roomId: hostSelectedRoomId, 
          startDate: hostStartDate, 
          startHour: startH, 
          endDate: hostEndDate, 
          endHour: endH 
        };

        saveBookingAndLock(offlineBooking, newLock);
        setHostOfflineGuestName('');
        alert('Range successfully locked, booked offline, and synchronized with calendar!');
      };

      const handleHostAuth = (e) => {
        e.preventDefault();
        if (hostPinInput === SECRET_PIN) {
          setIsHostAuthenticated(true);
          setIsHostLoginOpen(false);
          setPinError(false);
          setHostPinInput('');

          setPinError(true);
        }

      const currentPropertyObj = PROPERTIES.find(p => p.id === selectedPropertyId);
      const currentRoomObj = currentPropertyObj?.rooms.find(r => r.roomId === selectedRoomId);
      const hostPropObj = PROPERTIES.find(p => p.id === hostSelectedHouse);
      const hostRoomObj = hostPropObj?.rooms.find(r => r.roomId === hostSelectedRoomId);

      const isCurrentRangeBooked = hasRangeConflict(selectedRoomId, startDate, startTime, endDate, endTime);

      return (
        <div className="min-h-screen">
          
          {/* --- 1. LOTTIE ANIMATION ENTRANCE SCREEN --- */}
          <AnimatePresence>
            {showSplash && (
              <motion.div 
                initial={{ opacity: 1 }}

              >
                <div className="w-64 h-64 md:w-80 md:h-80 mb-4 flex items-center justify-center">
                   <img

                          <tr>
                            <th className="p-3">ID</th>
                            <th className="p-3">Guest Name</th>
                            <th className="p-3">Room</th>
                            <th className="p-3">Exact Booked Time Zone</th>
                            <th className="p-3">Payment / Type</th>
                            <th className="p-3">Status</th>
                            <th className="p-3">Action</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-neutral-200 bg-white">
                          {bookings.map((b) => (
                            <tr key={b.id}>
                              <td className="p-3 text-[#C5A059] font-mono font-bold">{b.id}</td>
                              <td className="p-3">
                                <p className="font-bold text-[#1A1815]">{b.guestName}</p>
                                <p className="text-neutral-500">{b.bookingType === 'Booked Offline - Payment Done' ? 'Booked offline (Payment done)' : b.guestPhone}</p>
                              </td>
                              <td className="p-3">{b.property} <br/><span className="text-[10px] text-neutral-400">{b.roomName}</span></td>
                              <td className="p-3">
                                From: <strong className="text-[#C5A059]">{b.startDate} ({String(b.startHour).padStart(2, '0')}:00)</strong><br/>
                                To: <strong className="text-[#C5A059]">{b.endDate} ({String(b.endHour).padStart(2, '0')}:00)</strong>
                              </td>
                              <td className="p-3">
                                <span className="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold text-[10px]">
                                  {b.bookingType || 'Online'}
                                </span>
                              </td>
                              <td className="p-3">
                                <span className={`px-2.5 py-1 rounded-full text-[10px] font-bold uppercase ${
                                  b.status === 'Completed' 
                                    ? 'bg-neutral-100 text-neutral-500' 
                                    : 'bg-green-100 text-green-700 border border-green-300'
                                }`}>
                                  {b.status || 'Active'}
                                </span>
                              </td>
                              <td className="p-3">
                                {b.status !== 'Completed' && (
                                  <button 
                                    onClick={() => markGuestCheckedOut(b.id)}
                                    className="text-[10px] border border-[#C5A059] text-[#C5A059] px-3 py-1 rounded-lg hover:bg-[#C5A059] hover:text-white transition"
                                  >
                                    Mark Checked Out
                                  </button>
                                )}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>

              </div>
            </motion.section>
          ) : (
            <div>
              {/* HERO SECTION */}
              <section className="relative min-h-[85vh] flex items-center justify-center px-6 overflow-hidden">
                <div className="absolute inset-0 z-0">
                  <video 
                    autoPlay 
                    loop 
                    muted 
                    playsInline
                    className="w-full h-full object-cover filter brightness-75 scale-105"
                  >
                    <source src="house-bg.mp4" type="video/mp4" />
                  </video>
                  <div className="absolute inset-0 bg-gradient-to-t from-[#FDFBF7] via-[#FDFBF7]/40 to-black/30" />
                </div>

                <motion.div 
                  initial={{ opacity: 0, y: 30 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ duration: 0.8 }}
                  className="relative z-10 max-w-4xl text-center space-y-6 glass-card-dark p-8 md:p-12 rounded-3xl border border-[#C5A059]/40 text-white shadow-2xl my-16 mb-10"
                >
                  <span className="inline-block text-xs uppercase tracking-[0.3em] text-[#C5A059] font-bold px-4 py-1.5 border border-[#C5A059]/40 rounded-full bg-black/40 backdrop-blur-md">
                    Unrivaled Private Luxury Stays (5 Rooms per Location)
                  </span>
                  <h1 className="text-4xl md:text-7xl font-serif font-extrabold tracking-tight text-amber-100">
                    Srinivas Service Home
                  </h1>
                  <p className="text-base md:text-xl text-neutral-300 max-w-2xl mx-auto font-light leading-relaxed">
                    Experience ultra-luxurious private stays across Rajahmundry, Bhimavaram, and Kovvur with dedicated suites, 24/7 concierge & automated reservations.
                  </p>

                  <div className="flex flex-col sm:flex-row justify-center gap-4 pt-4">
                    <a href="#booking" className="px-8 py-4 rounded-full bg-[#C5A059] text-white font-bold tracking-wider text-xs uppercase hover:bg-amber-600 transition shadow-lg shadow-[#C5A059]/30">
                      Book Experience
                    </a>
                    <a href="#properties" className="px-8 py-4 rounded-full border border-[#C5A059] text-white font-bold tracking-wider text-xs uppercase hover:bg-white/10 transition">
                      Explore Residences
                    </a>
                  </div>
                </motion.div>
              </section>

              {/* PROPERTY SHOWCASE (USER VIEW) */}
              <section id="properties" className="py-24 px-6 max-w-7xl mx-auto">
                <motion.div 
                  initial={{ opacity: 0, y: 20 }}
                  whileInView={{ opacity: 1, y: 0 }}
                  viewport={{ once: true }}
                  className="text-center space-y-3 mb-16"
                >
                  <h2 className="text-xs uppercase tracking-[0.3em] text-[#C5A059] font-bold">Interactive Room Tour</h2>
                  <p className="text-3xl md:text-5xl font-serif font-bold text-[#1A1815]">Our 3 Luxury Residences (5 Suites Each)</p>
                  <p className="text-xs text-neutral-500">Explore individual rooms, bedrooms, kitchens & balconies across all properties</p>
                </motion.div>

                <div className="grid md:grid-cols-3 gap-8">
                  {PROPERTIES.map((prop, idx) => (
                    <PropertyCard key={prop.id} prop={prop} index={idx} onOpenSidebar={(p) => setActiveSidebarProperty(p)} />
                  ))}
                </div>
              </section>

              {/* SIDEBAR DRAWER FOR ROOMS */}
              <AnimatePresence>
                {activeSidebarProperty && (
                  <motion.div 
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex justify-end"
                  >
                    <motion.div 
                      initial={{ x: '100%' }}
                      animate={{ x: 0 }}
                      exit={{ x: '100%' }}
                      transition={{ type: 'spring', damping: 25, stiffness: 200 }}
                      className="bg-white max-w-md w-full h-full shadow-2xl p-6 md:p-8 overflow-y-auto space-y-6 relative border-l border-[#C5A059]/40"
                    >
                      <button 
                        onClick={() => setActiveSidebarProperty(null)}
                        className="absolute top-6 right-6 p-2 rounded-full bg-neutral-100 text-neutral-600 hover:bg-neutral-200"
                      >✕</button>

                      <div className="space-y-2 pt-4">
                        <span className="text-xs font-bold uppercase tracking-widest text-[#C5A059]">5 Rooms Breakdown</span>
                        <h3 className="text-3xl font-serif font-bold text-[#1A1815]">{activeSidebarProperty.name}</h3>
                        <p className="text-xs text-neutral-500">{activeSidebarProperty.tagline}</p>
                      </div>

                      <div className="space-y-6">
                        {activeSidebarProperty.rooms.map((room, rIdx) => (
                          <div key={room.roomId} className="bg-[#FAF6F0] p-4 rounded-2xl border border-neutral-200 space-y-3">
                            <div className="flex justify-between items-center">
                              <h4 className="font-serif font-bold text-base text-[#1A1815]">{room.name}</h4>
                              <span className="text-[10px] bg-[#C5A059] text-white px-2.5 py-0.5 rounded-full">Suite {rIdx + 1}</span>
                            </div>
                            <div className="grid grid-cols-2 gap-2 text-xs text-neutral-600">
                              <div><span className="text-neutral-400">Area:</span> {room.specifications.sqft}</div>
                              <div><span className="text-neutral-400">Type:</span> {room.specifications.bedrooms}</div>
                            </div>
                            <div className="space-y-2">
                              {room.slides.map((s, sIdx) => (
                                <div key={sIdx} className="rounded-xl overflow-hidden border border-neutral-200">
                                  <img src={s.url} alt={s.title} className="w-full h-28 object-cover" />
                                  <p className="p-1 text-[11px] font-semibold text-center bg-white text-[#1A1815]">{s.title}</p>
                                </div>
                              ))}
                            </div>
                            <a 
                              href="#booking"
                              onClick={() => {
                                setSelectedPropertyId(activeSidebarProperty.id);
                                setSelectedRoomId(room.roomId);
                                setActiveSidebarProperty(null);
                              }}
                              className="block w-full text-center py-2.5 rounded-full bg-[#C5A059] text-white font-bold text-xs uppercase hover:bg-amber-600 transition"
                            >
                              Book This Room
                            </a>
                          </div>
                        ))}
                      </div>
                    </motion.div>
                  </motion.div>
                )}
              </AnimatePresence>

              {/* RESERVATION ENGINE WITH RANGE CALENDAR FOR USERS */}
              <section id="booking" className="py-24 px-6 bg-[#FAF6F0]/90 border-y border-[#C5A059]/20">
                <div className="max-w-4xl mx-auto space-y-12">
                  <motion.div 
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    className="text-center space-y-3"
                  >
                    <h2 className="text-xs uppercase tracking-[0.3em] text-[#C5A059] font-bold">Reservation Engine</h2>
                    <p className="text-3xl md:text-5xl font-serif font-bold text-[#1A1815]">Select Location, Room & Range Date/Time</p>
                  </motion.div>

                  <motion.form 
                    initial={{ opacity: 0, y: 30 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    transition={{ duration: 0.6 }}
                    onSubmit={handleBookingSubmit} 
                    className="glass-card border border-[#C5A059]/30 rounded-3xl p-6 md:p-10 space-y-8 shadow-xl"
                  >
                    {/* 1. Location */}
                    <div className="space-y-3">
                      <label className="text-xs uppercase tracking-wider text-[#C5A059] font-bold flex items-center space-x-2">
                        <i data-lucide="map-pin" className="w-4 h-4"></i>
                        <span>1. Location</span>
                      </label>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        {PROPERTIES.map((p) => (
                          <button
                            key={p.id}
                            type="button"
                            onClick={() => setSelectedPropertyId(p.id)}
                            className={`p-4 rounded-2xl border text-left transition-all duration-300 ${
                              selectedPropertyId === p.id 
                                ? 'border-[#C5A059] bg-[#FAF6F0] text-[#1A1815] shadow-md font-bold scale-[1.02]' 
                                : 'border-neutral-200 bg-white text-neutral-500 hover:border-[#C5A059]/50'
                            }`}
                          >
                            <p className="font-serif text-lg">{p.name}</p>
                            <p className="text-xs text-neutral-400 mt-1">5 Private Suites Available</p>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* 2. Specific Room selection */}
                    <div className="space-y-3">
                      <label className="text-xs uppercase tracking-wider text-[#C5A059] font-bold flex items-center space-x-2">
                        <i data-lucide="home" className="w-4 h-4"></i>
                        <span>2. Select Specific Room / Suite</span>
                      </label>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                        {currentPropertyObj.rooms.map((room) => (
                          <button
                            key={room.roomId}
                            type="button"
                            onClick={() => setSelectedRoomId(room.roomId)}
                            className={`p-4 rounded-2xl border text-left transition-all duration-300 relative ${
                              selectedRoomId === room.roomId 
                                ? 'border-[#C5A059] bg-[#FAF6F0] text-[#1A1815] shadow-md font-bold' 
                                : 'border-neutral-200 bg-white text-neutral-600 hover:border-[#C5A059]/50'
                            }`}
                          >
                            <p className="font-serif text-sm font-bold">{room.name}</p>
                            <p className="text-[10px] text-neutral-400 mt-1">{room.specifications.sqft}</p>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* RANGE CALENDAR & SELECTOR */}
                    <div className="space-y-4 bg-white p-6 rounded-2xl border border-neutral-200 shadow-sm">
                      <label className="text-xs uppercase tracking-wider text-[#C5A059] font-bold block">
                        3. Select Range Date & Time for {currentRoomObj?.name}
                      </label>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-[#FAF6F0] p-4 rounded-xl border border-neutral-200">
                        <div className="space-y-2">
                          <label className="text-[10px] uppercase font-bold text-neutral-500 block">From (Start Date & Time)</label>
                          <input 
                            type="date"
                            required
                            value={startDate}
                            onChange={(e) => setStartDate(e.target.value)}
                            className="bg-white border border-neutral-300 rounded-lg px-3 py-2 text-xs text-neutral-800 w-full mb-2"
                          />
                          <input 
                            type="time"
                            required
                            value={startTime}
                            onChange={(e) => setStartTime(e.target.value)}
                            className="bg-white border border-neutral-300 rounded-lg px-3 py-2 text-xs text-neutral-800 w-full"
                          />
                        </div>
                        <div className="space-y-2">
                          <label className="text-[10px] uppercase font-bold text-neutral-500 block">To (End Date & Time)</label>
                          <input 
                            type="date"
                            required
                            value={endDate}
                            onChange={(e) => setEndDate(e.target.value)}
                            className="bg-white border border-neutral-300 rounded-lg px-3 py-2 text-xs text-neutral-800 w-full mb-2"
                          />
                          <input 
                            type="time"
                            required
                            value={endTime}
                            onChange={(e) => setEndTime(e.target.value)}
                            className="bg-white border border-neutral-300 rounded-lg px-3 py-2 text-xs text-neutral-800 w-full"
                          />
                        </div>
                      </div>

                      <RangeAvailabilityCalendar 
                        roomId={selectedRoomId}
                        hostLocks={hostLocks}
                        bookings={bookings}
                        startDate={startDate}
                        endDate={endDate}
                      />

                      {isCurrentRangeBooked && (
                        <div className="p-3 bg-red-50 border border-red-200 rounded-xl text-center">
                          <p className="text-xs font-bold text-red-600">⚠️ Range Conflict! Part of this time range is already booked or locked. Please pick an available range.</p>
                        </div>
                      )}
                    </div>

                    {/* 4. Guest Information */}
                    <div className="space-y-4">
                      <label className="text-xs uppercase tracking-wider text-[#C5A059] font-bold">4. Guest Information</label>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input 
                          type="text" 
                          placeholder="Full Name" 
                          required 
                          value={guestDetails.name}
                          onChange={(e) => setGuestDetails({...guestDetails, name: e.target.value})}
                          className="bg-white border border-neutral-300 rounded-xl px-4 py-3 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                        />
                        <input 
                          type="tel" 
                          placeholder="Phone Number" 
                          required 
                          value={guestDetails.phone}
                          onChange={(e) => setGuestDetails({...guestDetails, phone: e.target.value})}
                          className="bg-white border border-neutral-300 rounded-xl px-4 py-3 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                        />
                        <input 
                          type="email" 
                          placeholder="Email Address" 
                          required 
                          value={guestDetails.email}
                          onChange={(e) => setGuestDetails({...guestDetails, email: e.target.value})}
                          className="bg-white border border-neutral-300 rounded-xl px-4 py-3 text-neutral-800 focus:outline-none focus:border-[#C5A059]" 
                        />
                      </div>
                    </div>

                    <div className="pt-6 border-t border-neutral-200 flex flex-col md:flex-row justify-between items-center gap-6">
                      <div>
                        <span className="text-xs uppercase text-neutral-400 block">Total Amount</span>
                        <span className="text-3xl font-extrabold text-[#C5A059]">₹{price.toLocaleString('en-IN')}</span>
                      </div>
                      <button 
                        type="submit" 
                        disabled={isCurrentRangeBooked}
                        className={`w-full md:w-auto px-10 py-4 rounded-full font-bold tracking-wider text-xs uppercase transition shadow-lg ${
                          isCurrentRangeBooked 
                            ? 'bg-neutral-300 text-neutral-500 cursor-not-allowed shadow-none' 
                            : 'bg-[#C5A059] text-white hover:bg-amber-600 hover:shadow-amber-500/20'
                        }`}
                      >
                        {isCurrentRangeBooked ? 'Range Unavailable' : 'Proceed to Payment'}
                      </button>
                    </div>

                  </motion.form>
                </div>
              </section>

              {/* FOOTER */}
              <footer id="contact" className="py-12 px-6 bg-[#1A1815] text-white text-center space-y-4">
                <p className="text-[#C5A059] font-serif text-xl font-bold">Srinivas Service Home</p>
                <p className="text-xs text-neutral-400">Direct Host Contact & Paytm: {DISPLAY_PHONE}</p>
                <p className="text-xs text-neutral-500">© {new Date().getFullYear()} Srinivas Service Home. All Rights Reserved.</p>
              </footer>
            </div>
          )}

          {/* CHECKOUT MODAL */}
          <AnimatePresence>
            {isCheckoutOpen && (
              <motion.div 
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md flex items-center justify-center p-4"
              >
                <motion.div 
                  initial={{ scale: 0.9, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  exit={{ scale: 0.9, opacity: 0 }}
                  className="bg-white border border-[#C5A059]/40 max-w-lg w-full rounded-3xl p-6 space-y-6 relative shadow-2xl"
                >
                  <button onClick={() => setIsCheckoutOpen(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-black">✕</button>

                  <div className="text-center space-y-2">
                    <h3 className="text-2xl font-serif font-bold text-[#1A1815]">Pay via Paytm UPI</h3>
                    <p className="text-xs text-neutral-500">Scan QR Code or Click Paytm link to authorize booking.</p>
                  </div>

                  <div className="bg-[#FAF6F0] p-4 rounded-2xl border border-neutral-200 space-y-2 text-sm">
                    <div className="flex justify-between">
                      <span className="text-neutral-500">Location:</span>
                      <span className="text-[#1A1815] font-bold">{currentPropertyObj.name} ({currentRoomObj?.name})</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-neutral-500">Range:</span>
                      <span className="text-[#C5A059] font-bold">{startDate} ({startTime}) to {endDate} ({endTime})</span>
                    </div>
                    <div className="flex justify-between border-t border-neutral-200 pt-2 font-bold text-base">
                      <span>Total Amount:</span>
                      <span className="text-[#C5A059]">₹{price.toLocaleString('en-IN')}</span>
                    </div>
                  </div>

                  <div className="text-center space-y-4">
                    <div className="bg-white p-3 inline-block rounded-2xl border border-neutral-200 shadow-md">
                      <img 
                        src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=7780376043@paytm&pn=SrinivasServiceHome&am=${price}`}
                        alt="Paytm QR" 
                        className="w-32 h-32 mx-auto"
                      />
                    </div>
                    <p className="text-xs text-neutral-500">Paytm Contact: <span className="text-[#C5A059] font-bold">{DISPLAY_PHONE}</span></p>

                    <div className="space-y-3">
                      <a href={`upi://pay?pa=7780376043@paytm&pn=SrinivasServiceHome&am=${price}`} className="block w-full py-3.5 rounded-full bg-[#C5A059] text-white font-bold hover:bg-amber-600 shadow-md">
                        Pay via Paytm App
                      </a>
                      <button onClick={finalizeBooking} className="w-full py-3.5 rounded-full border border-[#C5A059] text-[#1A1815] font-bold hover:bg-[#FAF6F0]">
                        Confirm & Send Details to WhatsApp
                      </button>
                    </div>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* HOST LOGIN MODAL */}
          <AnimatePresence>
            {isHostLoginOpen && (
              <motion.div 
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md flex items-center justify-center p-4"
              >
                <motion.div 
                  initial={{ scale: 0.9, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  exit={{ scale: 0.9, opacity: 0 }}
                  className="bg-white border border-[#C5A059]/40 max-w-md w-full rounded-3xl p-6 space-y-6 relative shadow-2xl"
                >
                  <button onClick={() => setIsHostLoginOpen(false)} className="absolute top-4 right-4 text-neutral-400 hover:text-black">✕</button>
                  
                  <div className="text-center space-y-2">
                    <h3 className="text-2xl font-serif font-bold text-[#1A1815]">Host Access Portal</h3>
                    <p className="text-xs text-neutral-500">Enter Security PIN (7780) to open host context</p>
                  </div>

                  <form onSubmit={handleHostAuth} className="space-y-4">
                    <input 
                      type="password"
                      maxLength={4}
                      placeholder="PIN (7780)"
                      value={hostPinInput}
                      onChange={(e) => setHostPinInput(e.target.value)}
                      className="w-full bg-[#FAF6F0] border border-neutral-300 rounded-xl px-4 py-3 text-center text-2xl tracking-widest text-neutral-800 focus:outline-none focus:border-[#C5A059]"
                    />
                    {pinError && <p className="text-xs text-red-500 text-center">Invalid Security PIN</p>}
                    <button type="submit" className="w-full py-3.5 rounded-full bg-[#C5A059] text-white font-bold">
                      Login
                    </button>
                  </form>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
